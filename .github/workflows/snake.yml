# .github/workflows/pacman.yml
name: Generate Pacman

on:
  schedule:
    # Gera um novo Pacman a cada 24 horas
    - cron: "0 0 * * *"
  # Permite executar manualmente a partir da aba Actions
  workflow_dispatch:
  # Executa automaticamente a cada push na branch main
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Gera o gráfico de contribuição do Pacman
      - name: Generate Pacman Contribution Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      # Envia as imagens do Pacman para a branch 'output'
      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
